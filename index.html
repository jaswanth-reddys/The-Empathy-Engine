<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Empathy Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: none;
            font-size: 16px;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #e8f6f3;
            border-radius: 4px;
            border-left: 5px solid #1abc9c;
        }
        audio {
            width: 100%;
            margin-top: 15px;
        }
        .emotion-tag {
            font-weight: bold;
            color: #1abc9c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Empathy Engine ️</h1>
        <form action="/generate" method="post">
            <textarea name="text" placeholder="Enter text here..." required>{{ input_text or '' }}</textarea>
            <button type="submit">Speak with Empathy</button>
        </form>

        {% if audio_url %}
        <div class="result">
            <p><strong>Detected Emotion:</strong> <span class="emotion-tag">{{ emotion }}</span></p>
            <p><strong>Intensity Polarity:</strong> {{ intensity }}</p>
            <audio controls autoplay>
                <source src="{{ audio_url }}" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
        {% endif %}
    </div>
</body>
</html>
